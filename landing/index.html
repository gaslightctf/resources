<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gaslightCTF 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        .logo {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .event-date {
            font-size: 1.3rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px 25px;
            min-width: 120px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .countdown-value {
            font-size: 3rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .countdown-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .event-status {
            font-size: 1.5rem;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .live-pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .logo {
                max-width: 350px;
            }

            .event-date {
                font-size: 1.1rem;
            }

            .countdown {
                gap: 15px;
            }

            .countdown-item {
                min-width: 100px;
                padding: 20px 15px;
            }

            .countdown-value {
                font-size: 2.2rem;
            }

            .countdown-label {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="wide.png" alt="gaslightCTF 2026" class="logo">
        
        <div class="event-date">
            August 21-24, 2026 • 12:00 UTC
        </div>

        <div id="countdown" class="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">--</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">--</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">--</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">--</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <div id="status" class="event-status" style="display: none;"></div>
    </div>

    <script>
        const startTime = new Date('2026-08-21T12:00:00Z');
        const endTime = new Date('2026-08-24T12:00:00Z');

        function updateCountdown() {
            const now = new Date();
            const statusEl = document.getElementById('status');
            const countdownEl = document.getElementById('countdown');

            if (now >= endTime) {
                countdownEl.style.display = 'none';
                statusEl.style.display = 'inline-block';
                statusEl.innerHTML = 'Event has ended. Thanks for participating!';
                return;
            }

            if (now >= startTime) {
                countdownEl.style.display = 'none';
                statusEl.style.display = 'inline-block';
                statusEl.innerHTML = '<span class="live-pulse"></span>Event is LIVE!';
                return;
            }

            const diff = startTime - now;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
